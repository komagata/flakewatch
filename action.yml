name: Flakewatch
description: Generate a static HTML report for flaky and slow tests from JUnit XML.

inputs:
  junit:
    description: JUnit XML glob. Use **/*.xml for recursive matching.
    required: false
    default: test-results/**/*.xml
  output:
    description: HTML report output path.
    required: false
    default: flakewatch.html
  source-base-url:
    description: Base URL for source links.
    required: false
    default: ""
  source-root:
    description: Local source root used to infer Ruby test line links.
    required: false
    default: "."
  version:
    description: Flakewatch release version to install.
    required: false
    default: v0.6.16
  upload-artifact:
    description: Upload the generated HTML report as a GitHub Actions artifact.
    required: false
    default: "true"
  artifact-name:
    description: GitHub Actions artifact name for the generated HTML report.
    required: false
    default: flakewatch.html
  download-artifacts:
    description: Download JUnit XML artifacts before generating the report. Enable this in a fan-in job after matrix test jobs upload their XML.
    required: false
    default: "false"
  download-artifact-pattern:
    description: Artifact name pattern to download when download-artifacts is true, for example junit-*.
    required: false
    default: ""
  download-artifact-path:
    description: Destination directory for downloaded JUnit XML artifacts.
    required: false
    default: test-results
  merge-artifacts:
    description: Merge downloaded artifacts into download-artifact-path.
    required: false
    default: "true"
  update-pr-description:
    description: Add or update a Flakewatch report link in the pull request description.
    required: false
    default: "true"
  add-job-summary:
    description: Add a Flakewatch report link to the GitHub Actions job summary.
    required: false
    default: "true"
  history-branch:
    description: Git branch used to persist JSONL test history. Leave empty to disable persistent history.
    required: false
    default: ""
  history-write:
    description: Write JSONL history to history-branch. Use auto to write only outside pull_request events.
    required: false
    default: auto

runs:
  using: composite
  steps:
    - name: Install flakewatch
      shell: bash
      run: |
        install_dir="${RUNNER_TEMP}/flakewatch"
        mkdir -p "$install_dir"
        if [ "${{ inputs.version }}" = "local" ]; then
          cd "${{ github.action_path }}"
          tya build src/main.tya -o "$install_dir/flakewatch"
        else
          FLAKEWATCH_VERSION="${{ inputs.version }}" \
            FLAKEWATCH_INSTALL_DIR="$install_dir" \
            sh "${{ github.action_path }}/install.sh"
        fi
        echo "$install_dir" >> "$GITHUB_PATH"

    - name: Checkout flakewatch history
      id: flakewatch-history
      if: inputs.history-branch != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        HISTORY_BRANCH: ${{ inputs.history-branch }}
      run: |
        history_dir="${RUNNER_TEMP}/flakewatch-history"
        mkdir -p "$history_dir"
        git init "$history_dir"
        cd "$history_dir"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        if git fetch --depth=1 origin "${HISTORY_BRANCH}"; then
          git checkout -B "${HISTORY_BRANCH}" "origin/${HISTORY_BRANCH}"
        else
          git checkout --orphan "${HISTORY_BRANCH}"
          git rm -rf . || true
        fi

        mkdir -p history
        find history -name '*.jsonl' -type f | sort | awk '{ files[NR] = $0 } END { for (i = 1; i <= NR - 1; i++) print files[i] }' | xargs -r rm -f
        find history -name '*.jsonl' -type f -print0 |
          xargs -0 -r perl -CS -i -pe 's/&/\\u0026/g; s/([^\x00-\x7F])/sprintf("\\u%04x", ord($1))/ge'
        echo "dir=${history_dir}" >> "$GITHUB_OUTPUT"
        echo "pattern=${history_dir}/history/**/*.jsonl" >> "$GITHUB_OUTPUT"

    - name: Download JUnit artifacts by pattern
      if: inputs.download-artifacts == 'true' && inputs.download-artifact-pattern != ''
      uses: actions/download-artifact@v7
      with:
        pattern: ${{ inputs.download-artifact-pattern }}
        path: ${{ inputs.download-artifact-path }}
        merge-multiple: ${{ inputs.merge-artifacts }}

    - name: Download all JUnit artifacts
      if: inputs.download-artifacts == 'true' && inputs.download-artifact-pattern == ''
      uses: actions/download-artifact@v7
      with:
        path: ${{ inputs.download-artifact-path }}
        merge-multiple: ${{ inputs.merge-artifacts }}

    - name: Generate flakewatch report
      shell: bash
      env:
        HISTORY_PATTERN: ${{ steps.flakewatch-history.outputs.pattern }}
      run: |
        if [[ "${{ inputs.junit }}" == *"**/*.xml" ]]; then
          junit_root="${{ inputs.junit }}"
          junit_root="${junit_root%%/**/*.xml}"
          find "$junit_root" -name '*.xml' -type f -print0 |
            xargs -0 -r perl -CS -i -pe 's/([^\x00-\x7F])/sprintf("&#x%04x;", ord($1))/ge'
        fi

        if [ -n "${{ inputs['source-base-url'] }}" ]; then
          source_base_url="${{ inputs['source-base-url'] }}"
        else
          source_base_url="https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_SHA}"
        fi

        args=(
          html
          --junit "${{ inputs.junit }}"
          --output "${{ inputs.output }}"
          --source-base-url "$source_base_url"
          --source-root "${{ inputs['source-root'] }}"
        )

        if [ -n "$HISTORY_PATTERN" ]; then
          args+=(--history "$HISTORY_PATTERN")
        fi

        flakewatch "${args[@]}"
        test -s "${{ inputs.output }}"

    - name: Write flakewatch history
      if: inputs.history-branch != '' && (inputs.history-write == 'true' || (inputs.history-write == 'auto' && github.event_name != 'pull_request'))
      shell: bash
      env:
        HISTORY_DIR: ${{ steps.flakewatch-history.outputs.dir }}
        HISTORY_BRANCH: ${{ inputs.history-branch }}
      run: |
        day="$(date -u +%Y/%m/%d)"
        run_file="${HISTORY_DIR}/history/${day}/run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}.jsonl"
        mkdir -p "$(dirname "$run_file")"

        flakewatch jsonl \
          --junit "${{ inputs.junit }}" \
          --output "$run_file"

        cd "$HISTORY_DIR"
        git add history
        git commit -m "Add flakewatch history for run ${GITHUB_RUN_ID}" || exit 0

        for attempt in 1 2 3; do
          if git push origin "HEAD:${HISTORY_BRANCH}"; then
            exit 0
          fi
          git fetch --depth=1 origin "${HISTORY_BRANCH}"
          git rebase "origin/${HISTORY_BRANCH}"
          sleep "$((attempt * 2))"
        done

        git push origin "HEAD:${HISTORY_BRANCH}"

    - name: Explain skipped flakewatch history write
      if: inputs.history-branch != '' && inputs.history-write == 'auto' && github.event_name == 'pull_request'
      shell: bash
      run: |
        echo "::warning::Flakewatch read history from '${{ inputs.history-branch }}', but did not write this pull_request run because history-write defaults to auto. Set history-write: true and grant contents: write if you want pull request runs to persist history."

    - name: Upload flakewatch report
      id: upload-flakewatch-report
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output }}
        archive: false
        if-no-files-found: error

    - name: Add flakewatch summary
      if: inputs.add-job-summary == 'true' && inputs.upload-artifact == 'true'
      shell: bash
      env:
        REPORT_URL: ${{ steps.upload-flakewatch-report.outputs.artifact-url }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
      run: |
        {
          echo "## Flakewatch"
          echo ""
          echo "<a href=\"${REPORT_URL}\" target=\"_blank\" rel=\"noopener noreferrer\">Open ${ARTIFACT_NAME}</a>"
          echo ""
          echo "Open the generated HTML report in a new browser tab."
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Update PR description with flakewatch report
      if: github.event_name == 'pull_request' && inputs.update-pr-description == 'true' && inputs.upload-artifact == 'true'
      continue-on-error: true
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPORT_URL: ${{ steps.upload-flakewatch-report.outputs.artifact-url }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
      run: |
        node <<'NODE'
        const markerStart = "<!-- flakewatch-report:start -->"
        const markerEnd = "<!-- flakewatch-report:end -->"
        const apiUrl = process.env.GITHUB_API_URL || "https://api.github.com"
        const repo = process.env.GITHUB_REPOSITORY
        const prNumber = process.env.PR_NUMBER
        const token = process.env.GITHUB_TOKEN
        const artifactName = process.env.ARTIFACT_NAME
        const reportUrl = process.env.REPORT_URL
        const bannerUrl = "https://raw.githubusercontent.com/komagata/flakewatch/main/assets/flakewatch-report.svg"

        const block = [
          markerStart,
          "## Flakewatch Report",
          "",
          `<a href="${reportUrl}" target="_blank" rel="noopener noreferrer"><img src="${bannerUrl}" alt="Flakewatch Report" width="150"></a>`,
          markerEnd
        ].join("\n")

        const headers = {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${token}`,
          "X-GitHub-Api-Version": "2022-11-28"
        }

        const prUrl = `${apiUrl}/repos/${repo}/pulls/${prNumber}`
        const response = await fetch(prUrl, { headers })
        if (!response.ok) {
          throw new Error(`Failed to fetch PR body: ${response.status} ${await response.text()}`)
        }

        const pr = await response.json()
        const body = (pr.body || "").trimEnd()
        const pattern = /<!-- flakewatch-report:start -->[\s\S]*?<!-- flakewatch-report:end -->/

        const nextBody = pattern.test(body)
          ? body.replace(pattern, block)
          : `${body}\n\n${block}`.trim()

        const updateResponse = await fetch(prUrl, {
          method: "PATCH",
          headers: {
            ...headers,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ body: `${nextBody}\n` })
        })

        if (!updateResponse.ok) {
          throw new Error(`Failed to update PR body: ${updateResponse.status} ${await updateResponse.text()}`)
        }
        NODE
