name: Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Run your normal test command here. Configure it to write JUnit XML.
      # Replace this example with your project's actual test command.
      - name: Run tests
        run: |
          bundle exec rspec \
            --format progress \
            --format RspecJunitFormatter \
            --out test-results/rspec.xml

      - name: Generate flakewatch report
        if: always()
        uses: komagata/flakewatch@v0.5.0
        with:
          junit: "test-results/**/*.xml"
