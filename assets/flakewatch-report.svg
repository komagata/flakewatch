<svg xmlns="http://www.w3.org/2000/svg" width="760" height="140" viewBox="0 0 760 140" role="img" aria-labelledby="title desc">
  <title id="title">Flakewatch Report</title>
  <desc id="desc">A banner linking to the Flakewatch flaky and slow test report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="760" height="140" rx="18" fill="url(#bg)"/>
  <g opacity="0.22">
    <circle cx="646" cy="28" r="80" fill="#22c55e"/>
    <circle cx="716" cy="108" r="92" fill="#38bdf8"/>
  </g>
  <g transform="translate(34 30)" filter="url(#shadow)">
    <rect width="78" height="78" rx="18" fill="#f8fafc"/>
    <path d="M22 52h34" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <path d="M22 38h22" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
    <path d="M22 24h34" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <path d="M54 33l8 8 14-18" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="136" y="56" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="700">Flakewatch Report</text>
  <text x="136" y="88" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">Flaky tests, healed candidates, and slow test rankings</text>
  <g transform="translate(584 48)">
    <rect width="138" height="44" rx="22" fill="#f8fafc"/>
    <text x="69" y="29" text-anchor="middle" fill="#0f172a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700">Open HTML</text>
  </g>
</svg>
