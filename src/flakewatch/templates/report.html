<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flakewatch Report</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;margin:32px;color:#1f2937;background:#f8fafc}
    h1{margin:0 0 8px}
    h2{margin-top:28px}
    .summary{display:flex;gap:12px;flex-wrap:wrap}
    .metric{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;min-width:130px}
    .metric strong{display:block;font-size:28px}
    table{width:100%;table-layout:fixed;border-collapse:collapse;background:white;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
    th,td{padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:left;vertical-align:top}
    th{background:#eef2f7;font-size:12px;text-transform:uppercase;color:#475569}
    th[data-sort]{cursor:pointer;user-select:none}
    th[data-sort]::after{content:'sort';display:inline-block;font-size:11px;line-height:1;margin-left:8px;color:#64748b;vertical-align:1px;text-transform:none}
    th.sort-asc::after{content:'asc';color:#0f172a}
    th.sort-desc::after{content:'desc';color:#0f172a}
    .test-col{width:58%}
    .num{text-align:right;width:96px;white-space:nowrap}
    .status{font-weight:600;width:96px;white-space:nowrap}
    td:first-child,a{overflow-wrap:anywhere;word-break:break-word}
    .empty{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:18px;color:#64748b}
  </style>
</head>
<body>
  <h1>Flakewatch Report</h1>
  <p>JUnit XML analysis for flaky and slow tests.</p>
  <div class="summary">
    {{ for metric in metrics }}
      <div class="metric"><strong>{{ metric.value }}</strong>{{ metric.label }}</div>
    {{ end }}
  </div>
  {{ for section in sections }}
    <h2>{{ section.title }}</h2>
    {{{ section.body }}}
  {{ end }}
  {{{ sort_script }}}
</body>
</html>
